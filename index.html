<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="stylesheet" href="./styles/overlay.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body onload="loadPokemon()">
    <header>
        <div class="logo">
            <h1>Pokédex</h1>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search Pokémon..." onkeyup="searchPokemon()">
            <button id="search-button" onclick="searchPokemon()">Search</button>
        </div>
    </header>

    <main class="content">
        <div id="pokedex_list" class="d_flex_wrap"></div>

        <div id="loading-spinner" class="d_none spinner"></div>
        <button id="load-more" onclick="loadPokemon()">Load More</button>
    </main>

    <div id="overlay" class="d_none"></div>

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>
</body>

</html>
